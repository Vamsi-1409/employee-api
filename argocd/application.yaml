apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: employee-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Vamsi-1409/employee-api.git
    targetRevision: main
    path: helm

  destination:
    server: https://kubernetes.default.svc
    namespace: go-web-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
